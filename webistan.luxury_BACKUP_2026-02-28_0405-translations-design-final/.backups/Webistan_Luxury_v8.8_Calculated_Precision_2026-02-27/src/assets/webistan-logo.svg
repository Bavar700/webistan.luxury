<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <!-- Gold radial gradient for the gem facets -->
    <radialGradient id="goldCenter" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFF8DC"/>
      <stop offset="30%"  stop-color="#F5C842"/>
      <stop offset="70%"  stop-color="#C9982A"/>
      <stop offset="100%" stop-color="#7B5A0A"/>
    </radialGradient>

    <!-- Darker gold for outer ring arcs -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5C842"/>
      <stop offset="50%"  stop-color="#E8AB20"/>
      <stop offset="100%" stop-color="#A07010"/>
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C9982A" flood-opacity="0.4"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>

  </defs>

  <!-- ── ПРОЗРАЧНЫЙ ФОН — background убран ── -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#goldRing)" stroke-width="1.2" opacity="0.6"/>

  <!-- ═══════════════════════════════════════
       OUTER ORBIT RING with 8 tick marks
  ════════════════════════════════════════ -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#goldRing)" stroke-width="0.8" opacity="0.35" stroke-dasharray="4 8"/>

  <!-- 8 small orbit dots -->
  <g fill="#F5C842" opacity="0.7" filter="url(#glow)">
    <circle cx="100" cy="22"  r="2"/>
    <circle cx="155.6" cy="44.4" r="2"/>
    <circle cx="178" cy="100" r="2"/>
    <circle cx="155.6" cy="155.6" r="2"/>
    <circle cx="100" cy="178" r="2"/>
    <circle cx="44.4" cy="155.6" r="2"/>
    <circle cx="22"  cy="100" r="2"/>
    <circle cx="44.4" cy="44.4" r="2"/>
  </g>

  <!-- ═══════════════════════════════════════
       WEB SPOKE LINES — 8 spokes from center
  ════════════════════════════════════════ -->
  <g stroke="url(#goldRing)" stroke-width="0.7" opacity="0.25" clip-path="url(#circleClip)">
    <line x1="100" y1="22"  x2="100" y2="178"/>
    <line x1="22"  y1="100" x2="178" y2="100"/>
    <line x1="44.4" y1="44.4" x2="155.6" y2="155.6"/>
    <line x1="155.6" y1="44.4" x2="44.4" y2="155.6"/>
  </g>

  <!-- ═══════════════════════════════════════
       INNER GEM / DIAMOND SHAPE
       A precise 8-pointed star (octagram) cut like a gem
  ════════════════════════════════════════ -->

  <!-- Outer octagon shell -->
  <polygon
    points="100,30 130,56 170,60 148,88 160,120 130,130 118,165 100,148 82,165 70,130 40,120 52,88 30,60 70,56"
    fill="none"
    stroke="url(#goldRing)"
    stroke-width="1.2"
    opacity="0.5"
  />

  <!-- Gem facets — upper crown -->
  <polygon points="100,48 122,72 100,84 78,72"
    fill="url(#goldCenter)" opacity="0.95" filter="url(#glow)"/>

  <!-- Gem facets — lower pavilion -->
  <polygon points="100,152 122,128 100,116 78,128"
    fill="#C9982A" opacity="0.85"/>

  <!-- Gem facets — left -->
  <polygon points="48,100 72,78 84,100 72,122"
    fill="#D4A41E" opacity="0.85"/>

  <!-- Gem facets — right -->
  <polygon points="152,100 128,78 116,100 128,122"
    fill="#E8B820" opacity="0.85"/>

  <!-- Gem facets — upper-left -->
  <polygon points="61,61 84,72 78,84 56,72"
    fill="#C08010" opacity="0.75"/>

  <!-- Gem facets — upper-right -->
  <polygon points="139,61 144,72 122,84 116,72"
    fill="#E0C030" opacity="0.80"/>

  <!-- Gem facets — lower-left -->
  <polygon points="61,139 72,128 84,116 56,128"
    fill="#B07010" opacity="0.75"/>

  <!-- Gem facets — lower-right -->
  <polygon points="139,139 144,128 116,116 128,128"
    fill="#D0A020" opacity="0.80"/>

  <!-- Gem center table (brightest) -->
  <polygon points="100,84 122,100 100,116 78,100"
    fill="url(#goldCenter)" filter="url(#glow)" opacity="1"/>

  <!-- Center glint highlight -->
  <ellipse cx="96" cy="94" rx="6" ry="4" fill="white" opacity="0.45" transform="rotate(-30,96,94)"/>

  <!-- ═══════════════════════════════════════
       WEB NETWORK NODES — small gold dots
       at each facet junction
  ════════════════════════════════════════ -->
  <g fill="#F5C842" filter="url(#glow)">
    <circle cx="100" cy="48"  r="2.5"/>
    <circle cx="100" cy="152" r="2.5"/>
    <circle cx="48"  cy="100" r="2.5"/>
    <circle cx="152" cy="100" r="2.5"/>
    <circle cx="61"  cy="61"  r="2.5"/>
    <circle cx="139" cy="61"  r="2.5"/>
    <circle cx="61"  cy="139" r="2.5"/>
    <circle cx="139" cy="139" r="2.5"/>
    <!-- center node -->
    <circle cx="100" cy="100" r="3.5" opacity="0.9"/>
  </g>

  <!-- ═══════════════════════════════════════
       OUTER ELEGANT BORDER
  ════════════════════════════════════════ -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#goldRing)" stroke-width="0.6" opacity="0.4"/>

</svg>
