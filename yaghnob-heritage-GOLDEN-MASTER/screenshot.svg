<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" />
  <text x="50%" y="45%" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    Webistan Modern
  </text>
  <text x="50%" y="55%" font-family="Arial, sans-serif" font-size="40" fill="#e0e7ff" text-anchor="middle" filter="url(#shadow)">
    Premium WordPress Theme
  </text>
  <text x="50%" y="62%" font-family="Arial, sans-serif" font-size="24" fill="#c7d2fe" text-anchor="middle">
    v1.0.0
  </text>
</svg>