name: ofarin_app
description: "Офарин! Ту метавонӣ! - Gamified family task manager for children"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend & Auth
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4

  # UI Components
  pin_code_fields: ^8.0.1
  lottie: ^3.1.3
  confetti: ^0.8.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3

  # Localization
  easy_localization: ^3.0.7

  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.6
  equatable: ^2.0.7
  dartz: ^0.10.1
  uuid: ^4.5.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  timeago: ^3.7.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Local Storage
  shared_preferences: ^2.3.4

  # Environment Variables
  flutter_dotenv: ^5.2.1
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/translations/
    - .env
