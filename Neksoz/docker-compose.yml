version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - neksoz_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:latest
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8091:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
        if (isset($$_SERVER['HTTP_X_FORWARDED_HOST'])) {
            $$_SERVER['HTTP_HOST'] = $$_SERVER['HTTP_X_FORWARDED_HOST'];
        }
        if (isset($$_SERVER['HTTP_HOST'])) {
            define('WP_HOME', ((isset($$_SERVER['HTTPS']) && $$_SERVER['HTTPS'] === 'on') ? 'https://' : 'http://') . $$_SERVER['HTTP_HOST']);
            define('WP_SITEURL', ((isset($$_SERVER['HTTPS']) && $$_SERVER['HTTPS'] === 'on') ? 'https://' : 'http://') . $$_SERVER['HTTP_HOST']);
        }
        define('WP_DEFAULT_THEME', 'neksoz');
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
    volumes:
      - .:/var/www/html/wp-content/themes/neksoz:rw
      - ../neksoz-b2b-reviews.php:/var/www/html/wp-content/plugins/neksoz-b2b-reviews/neksoz-b2b-reviews.php:rw

volumes:
  neksoz_db_data:
