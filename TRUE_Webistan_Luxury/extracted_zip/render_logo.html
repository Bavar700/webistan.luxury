<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #070710; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
  svg { width: 800px; height: 800px; }
</style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <!-- Deep radial glow from center outward -->
    <radialGradient id="bladeGrad" cx="100" cy="100" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFCE8"/>
      <stop offset="18%"  stop-color="#F8D654"/>
      <stop offset="45%"  stop-color="#D49010"/>
      <stop offset="75%"  stop-color="#9A5E08"/>
      <stop offset="100%" stop-color="#5C3000"/>
    </radialGradient>

    <!-- Blade edge highlight (top-light) -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFF5" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#FFE87A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFE87A" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F8D654"/>
      <stop offset="50%"  stop-color="#D49010"/>
      <stop offset="100%" stop-color="#7A4A00"/>
    </linearGradient>

    <!-- Center glow radial -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFF0" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#F8D654" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F8D654" stop-opacity="0"/>
    </radialGradient>

    <!-- Node outer glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFF0"/>
      <stop offset="50%"  stop-color="#F8D654"/>
      <stop offset="100%" stop-color="#F8D654" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft luminous glow filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background drop shadow -->
    <filter id="bgShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10"
        flood-color="#C98218" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle inner shadow for depth -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ══════════════════════════════
       DARK OBSIDIAN BACKGROUND
  ══════════════════════════════ -->
  <circle cx="100" cy="100" r="97" fill="#070710" filter="url(#bgShadow)"/>

  <!-- Outer decorative rings -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="url(#ringGrad)" stroke-width="1.6" opacity="0.75"/>
  <circle cx="100" cy="100" r="89" fill="none" stroke="url(#ringGrad)" stroke-width="0.5"
    opacity="0.25" stroke-dasharray="3 10"/>

  <!-- Subtle inner orbit circle -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="0.5"
    opacity="0.18" stroke-dasharray="2 7"/>

  <!-- Faint outer triangle connecting the 3 blade tips -->
  <polygon
    points="100,27 161,136 39,136"
    fill="none" stroke="url(#ringGrad)" stroke-width="0.7" opacity="0.2"/>

  <!-- ══════════════════════════════════════════════
       THREE CURVED TRISKELION BLADES
       Blade path: pointed kite with bezier curves
       rotating 120° around center (100,100)
  ══════════════════════════════════════════════ -->

  <!-- ─── Blade 1 (pointing UP, 0°) — brightest, front-facing ─── -->
  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#bladeGrad)"
    opacity="0.97"/>

  <!-- Shine on blade 1 -->
  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#shineGrad)"
    opacity="0.65"/>

  <!-- Left facet darkening on blade 1 -->
  <path d="M 100,27 L 88,107 L 100,120 C 70,95 65,55 100,27 Z"
    fill="#000000" opacity="0.22"/>

  <!-- ─── Blade 2 (pointing LOWER-RIGHT, 120°) ─── -->
  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#bladeGrad)"
    transform="rotate(120, 100, 100)"
    opacity="0.88"/>

  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#shineGrad)"
    transform="rotate(120, 100, 100)"
    opacity="0.40"/>

  <path d="M 100,27 L 88,107 L 100,120 C 70,95 65,55 100,27 Z"
    fill="#000000"
    transform="rotate(120, 100, 100)"
    opacity="0.28"/>

  <!-- ─── Blade 3 (pointing LOWER-LEFT, 240°) ─── -->
  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#bladeGrad)"
    transform="rotate(240, 100, 100)"
    opacity="0.80"/>

  <path d="M 100,27
           C 135,55 130,95 112,107
           L 100,120
           L 88,107
           C 70,95 65,55 100,27 Z"
    fill="url(#shineGrad)"
    transform="rotate(240, 100, 100)"
    opacity="0.28"/>

  <path d="M 100,27 L 88,107 L 100,120 C 70,95 65,55 100,27 Z"
    fill="#000000"
    transform="rotate(240, 100, 100)"
    opacity="0.32"/>

  <!-- ══════════════════════════════
       CENTER GLOW
  ══════════════════════════════ -->
  <circle cx="100" cy="100" r="22"
    fill="url(#centerGlow)"
    filter="url(#innerGlow)"/>

  <circle cx="100" cy="100" r="5"
    fill="#FFFFF0"
    filter="url(#glow)"
    opacity="0.9"/>

  <!-- ══════════════════════════════
       THREE OUTER TIP NODES
  ══════════════════════════════ -->

  <!-- Node 1 (top) -->
  <circle cx="100" cy="27" r="9" fill="url(#nodeGlow)" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="27" r="4.5" fill="#FFF8D0" filter="url(#glow)"/>
  <circle cx="100" cy="27" r="2"   fill="#FFFFFF"/>

  <!-- Node 2 (lower-right) -->
  <circle cx="100" cy="27" r="9"   fill="url(#nodeGlow)" filter="url(#glow)"
    transform="rotate(120,100,100)" opacity="0.4"/>
  <circle cx="100" cy="27" r="4.5" fill="#F8D654" filter="url(#glow)"
    transform="rotate(120,100,100)"/>
  <circle cx="100" cy="27" r="2"   fill="#FFF0A0"
    transform="rotate(120,100,100)"/>

  <!-- Node 3 (lower-left) -->
  <circle cx="100" cy="27" r="9"   fill="url(#nodeGlow)" filter="url(#glow)"
    transform="rotate(240,100,100)" opacity="0.35"/>
  <circle cx="100" cy="27" r="4.5" fill="#D49010" filter="url(#glow)"
    transform="rotate(240,100,100)"/>
  <circle cx="100" cy="27" r="2"   fill="#F8D654"
    transform="rotate(240,100,100)"/>

  <!-- ══════════════════════════════
       FINE INNER DETAIL LINES
       (subtle radial spokes near center)
  ══════════════════════════════ -->
  <g stroke="url(#ringGrad)" stroke-width="0.5" opacity="0.18">
    <line x1="100" y1="78" x2="100" y2="100"/>
    <line x1="100" y1="78" x2="100" y2="100" transform="rotate(120,100,100)"/>
    <line x1="100" y1="78" x2="100" y2="100" transform="rotate(240,100,100)"/>
  </g>

  <!-- ══════════════════════════════
       FINAL OUTER EDGE
  ══════════════════════════════ -->
  <circle cx="100" cy="100" r="93" fill="none"
    stroke="#F8D654" stroke-width="0.4" opacity="0.20"/>

</svg>
</body>
</html>
