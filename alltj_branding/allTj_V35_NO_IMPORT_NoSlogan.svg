<svg width="224" height="42" viewBox="25 6 112 21" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes shimmerSlide_v35_noslog {
        0% { transform: translateX(-50px); }
        70% { transform: translateX(150px); }
        100% { transform: translateX(150px); }
      }
      .mover_v35_noslog {
        animation: shimmerSlide_v35_noslog 6s infinite;
      }
    </style>
    
    <linearGradient id="mask-grad_v35_noslog" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="black" />
      <stop offset="50%" stop-color="white" />
      <stop offset="100%" stop-color="black" />
    </linearGradient>

    <mask id="shimmer-mask_v35_noslog">
      <rect x="0" y="0" width="224" height="42" fill="black" />
      <rect x="0" y="0" width="40" height="42" fill="url(#mask-grad_v35_noslog)" class="mover_v35_noslog" />
    </mask>
  </defs>

  <text x="81" y="22" font-family="Outfit, sans-serif" font-weight="900" font-size="19"
        fill="#EFBF04" text-anchor="middle" textLength="110" lengthAdjust="spacingAndGlyphs">allTj.online</text>
        
  <text x="81" y="22" font-family="Outfit, sans-serif" font-weight="900" font-size="19"
        fill="#FFFFFF" text-anchor="middle" textLength="110" lengthAdjust="spacingAndGlyphs" mask="url(#shimmer-mask_v35_noslog)">allTj.online</text>
</svg>
