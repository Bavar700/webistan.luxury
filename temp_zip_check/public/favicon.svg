<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F5C842" />
      <stop offset="100%" stop-color="#A07010" />
    </linearGradient>
    
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#logoGlow)">
    {/* Outer Architectural Frame */}
    <path
      d="M50 5 L90 45 L50 85 L10 45 Z"
      fill="none"
      stroke="url(#logoGold)"
      stroke-width="1"
      opacity="0.4"
    />
    
    {/* Inner Kinetic Structure */}
    <path
      d="M50 20 L75 45 L50 70 L25 45 Z"
      fill="none"
      stroke="url(#logoGold)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    {/* Central Precision Point */}
    <circle cx="50" cy="45" r="3" fill="url(#logoGold)" />

    {/* Global Connection Nodes */}
    <circle cx="50" cy="20" r="1.5" fill="url(#logoGold)" />
    <circle cx="50" cy="70" r="1.5" fill="url(#logoGold)" />
    <circle cx="25" cy="45" r="1.5" fill="url(#logoGold)" />
    <circle cx="75" cy="45" r="1.5" fill="url(#logoGold)" />
  </g>
</svg>