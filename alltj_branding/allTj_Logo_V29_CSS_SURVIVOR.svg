<svg width="112" height="29" viewBox="25 6 112 30" xmlns="http://www.w3.org/2000/svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&amp;family=Abril+Fatface&amp;display=swap');
        
        @keyframes shine-f8de {
            0% { transform: translateX(-150%) rotate(25deg); }
            40%, 100% { transform: translateX(150%) rotate(25deg); }
        }

        .sh-f8de {
            animation: shine-f8de 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform-origin: center;
        }
    </style>
    
    <text x="81" y="22" font-family="Outfit, sans-serif" font-weight="900" font-size="19" fill="#EFBF04" text-anchor="middle" textLength="110" lengthAdjust="spacingAndGlyphs">allTj.online</text>
    <text x="81" y="33" font-family="Abril Fatface, serif" font-weight="400" font-size="7" fill="#475569" text-anchor="middle" textLength="110" lengthAdjust="spacingAndGlyphs">Your Local Guide To Tajikistan</text>
    
    <rect class="sh-f8de" x="25" y="0" width="30" height="40" fill="white" opacity="0.4" style="pointer-events: none;" />
</svg>
